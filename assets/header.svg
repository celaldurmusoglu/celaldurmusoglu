<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2196F3" />
      <stop offset="50%" stop-color="#00BCD4" />
      <stop offset="100%" stop-color="#2196F3" />
      <animate attributeName="x1" values="0%;-100%;0%" dur="10s" repeatCount="indefinite" />
      <animate attributeName="x2" values="100%;0%;100%" dur="10s" repeatCount="indefinite" />
    </linearGradient>
    <style>
      .title {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        font-size: 52px;
        font-weight: 800;
        fill: url(#textGrad);
        text-anchor: middle;
      }
      .subtitle {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        font-size: 24px;
        font-weight: 500;
        fill: #6b7280;
        text-anchor: middle;
      }
      @media (prefers-color-scheme: dark) {
        .subtitle {
          fill: #9ca3af;
        }
      }
      .anim-1 {
        animation: slideUp 1s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        opacity: 0;
      }
      .anim-2 {
        animation: slideUp 1s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        animation-delay: 0.3s;
        opacity: 0;
      }
      @keyframes slideUp {
        0% { opacity: 0; transform: translateY(20px); }
        100% { opacity: 1; transform: translateY(0px); }
      }
    </style>
  </defs>

  <text x="400" y="100" class="title anim-1">Hi there! I'm Celal 👋</text>
  <text x="400" y="150" class="subtitle anim-2">Welcome to my GitHub Profile</text>
</svg>
